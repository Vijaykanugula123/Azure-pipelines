resources:
  repositories:
    - repository: test-code
      type: git
      name: client/test-code
      trigger:
        branches:
          include:
            - main

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - deployment/**  # Trigger when deployment files change in this repository

pr:
  branches:
    include:
      - main
variables:
  dockerRegistryServiceConnection: 'c1c632d7-148b-41c8-942d-3e71b69260f4'
  imageRepository: 'notes-app'
  containerRegistry: 'clientcinacrall.azurecr.io'
  #dockerfilePath: '$(System.DefaultWorkingDirectory)/test-code/Dockerfile'
  imagePullSecret: docker-registry-creds
  tag: '$(Build.BuildId)'
  vmImageName: ubuntu-latest

stages:
- stage: Build
  displayName: Build and Push
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - checkout: self
    - checkout: test-code
    - script: cd $(Build.SourcesDirectory)/test-code ; ls;
      displayName: print sources directory
    - task: Docker@2
      displayName: Build and Push Image
      inputs:
        command: buildAndPush
        arguments: --no-cache
        repository: $(imageRepository)-qa
        dockerfile: $(Build.SourcesDirectory)/test-code/Dockerfile
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
    - upload: $(Build.SourcesDirectory)/pipelines-repo/test-code/deployments
      artifact: deployments

- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  jobs:
  - deployment: Deploy
    displayName: Deploy to AKS
    pool:
      vmImage: $(vmImageName)
    environment: qa
    strategy:
      runOnce:
        deploy:
          steps:
          - task: KubernetesManifest@0
            displayName: Create imagePullSecret
            inputs:
              kubernetesServiceConnection: client-CIN-AKS-DQU
              namespace: qa
              action: createSecret
              secretName: $(imagePullSecret)
              dockerRegistryEndpoint: $(dockerRegistryServiceConnection)

          - task: KubernetesManifest@0
            displayName: Delete Deployment
            inputs:
              kubernetesServiceConnection: client-CIN-AKS-DQU
              namespace: qa
              action: delete
              arguments: deployment notes-app
            continueOnError: true

          - task: KubernetesManifest@0
            displayName: Deploy to Kubernetes cluster
            inputs:
              kubernetesServiceConnection: client-CIN-AKS-DQU
              namespace: qa
              action: deploy
              manifests: |
                $(Pipeline.Workspace)/deployments/deployment-qa.yaml
                $(Pipeline.Workspace)/deployments/service.yaml
              imagePullSecrets: |
                $(imagePullSecret)
              containers: |
                $(containerRegistry)/$(imageRepository)-qa:$(tag)
